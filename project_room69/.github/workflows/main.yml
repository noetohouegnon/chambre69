name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18.x'
        cache: 'npm'

    - name: Install Frontend Dependencies
      run: npm ci

    - name: Build Frontend
      run: npm run build

    - name: Install Backend Dependencies
      working-directory: ./backend
      run: npm ci

    - name: Build Backend
      working-directory: ./backend
      run: npm run build

    - name: Prisma Generate
      working-directory: ./backend
      run: npx prisma generate

    - name: Validate Backend Seed Script
      working-directory: ./backend
      run: node --version && npx ts-node prisma/seed.ts --help
